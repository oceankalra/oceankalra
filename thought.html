<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Thought for the Week | Ocean Kalra</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f9ff;
  --card: #ffffff;
  --text: #000000;
  --accent: #5b7cff;
  --soft: #eef4ff;
}

body.dark {
  --bg: #101522;
  --card: #1a2033;
  --text: #ffffff;
  --soft: #222a44;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  line-height: 1.75;
  font-family: 'Source Serif Pro', serif;
  font-size: 18px;

  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}


a {
  text-decoration: none;
  color: inherit;
}

/* Buttons */
#homeBtn,
#themeToggle {
  position: fixed;
  top: 20px;
  z-index: 1000;
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
}

#homeBtn { left: 20px; }
#themeToggle { right: 20px; }

/* Header */
header {
  padding: 110px 20px 50px;
  text-align: center;
  background: linear-gradient(180deg, #6fa8ff, #dbe9ff);
}

header h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

header p {
  max-width: 760px;
  margin: 0 auto;
  font-size: 18px;
}

/* Main content card */
main {
  max-width: 900px;
  margin: 40px auto;
  background: var(--card);
  padding: 50px 30px;
  border-radius: 14px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
}

h2 {
  color: var(--accent);
  margin-top: 40px;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2322341954267310"
     crossorigin="anonymous"></script>
</head>

<body>

<button id="homeBtn" onclick="window.location.href='indexwriting.html'">← Back to Writing Hub</button>
<button id="themeToggle">🌙</button>

<header>
  <h1>Thought for the Week</h1>
  <p>A brief reflection or idea to pause with while moving through the week.</p>
</header>

<main>
  <p>🌿At times when a combination isn't a given, choosing between meaning and time becomes a tough call.</p>
</main>

<footer style="margin-top: 50px; text-align: center; padding: 20px; background: var(--accent); color: white;">
  © 2026 Ocean Kalra | Public Speaking, Psychology & AI 
</footer>

<script>
const themeToggle = document.getElementById("themeToggle");

themeToggle.onclick = () => {
  document.body.classList.toggle("dark");
  themeToggle.textContent =
    document.body.classList.contains("dark") ? "☀️" : "🌙";
};

/* Disable copy, right-click, shortcuts */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('paste', e => e.preventDefault());

document.addEventListener('keydown', function (e) {
  if ((e.ctrlKey || e.metaKey) &&
      (e.key === 'c' || e.key === 'x' || e.key === 'a')) {
    e.preventDefault();
  }
});
</script>

</body>

</html>
